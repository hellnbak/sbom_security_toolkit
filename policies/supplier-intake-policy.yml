name: supplier-intake-policy
description: Baseline policy for SBOMs received from software suppliers.
fail_on:
  cisa_kev: true
  critical_without_vex: true
  missing_license_percent_gt: 30
  missing_purl_percent_gt: 25
  unknown_components_gt: 10
  no_dependency_graph: false
warn_on:
  high_cvss_count_gt: 5
  no_dependency_graph: true
