name: CI

on:
  push:
  pull_request:

jobs:
  test-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Fast tests
        run: make test-fast
      - name: Offline integration smoke
        run: make test-integration-offline
