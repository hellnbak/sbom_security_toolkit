name: ClusterFuzzLite PR
on:
  pull_request:
    paths:
      - 'fuzzing/**'
      - 'sbomops/**'
      - '.fuzz/**'
      - '.github/workflows/clusterfuzzlite-pr.yml'
jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          fuzz-seconds: 60
          mode: 'code-change'
