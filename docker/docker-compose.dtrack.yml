services:
  dependency-track-apiserver:
    image: dependencytrack/apiserver:latest
    environment:
      - ALPINE_DATABASE_MODE=external
      - ALPINE_DATABASE_URL=jdbc:postgresql://dtrack-postgres:5432/dtrack
      - ALPINE_DATABASE_DRIVER=org.postgresql.Driver
      - ALPINE_DATABASE_USERNAME=dtrack
      - ALPINE_DATABASE_PASSWORD=${DTRACK_POSTGRES_PASSWORD:?set DTRACK_POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      - dtrack-postgres
  dependency-track-frontend:
    image: dependencytrack/frontend:latest
    ports:
      - "127.0.0.1:8082:8080"
    environment:
      - API_BASE_URL=http://127.0.0.1:8081
  dtrack-postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=dtrack
      - POSTGRES_USER=dtrack
      - POSTGRES_PASSWORD=${DTRACK_POSTGRES_PASSWORD:?set DTRACK_POSTGRES_PASSWORD}
    volumes:
      - dtrack-postgres:/var/lib/postgresql/data
volumes:
  dtrack-postgres:
