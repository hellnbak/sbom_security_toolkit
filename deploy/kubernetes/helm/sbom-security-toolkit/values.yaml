image:
  repository: sbom-security-toolkit
  tag: 2.5.0
  pullPolicy: IfNotPresent
web:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: '1'
      memory: 1Gi
worker:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '2'
      memory: 4Gi
  maxConcurrentJobs: 1
postgres:
  external: false
  host: ''
redis:
  external: false
  host: ''
s3:
  bucket: ''
  prefix: sbom-security-toolkit
oidc:
  enabled: false
  issuer: ''
  clientIdSecretRef: sst-oidc-client-id
  clientSecretSecretRef: sst-oidc-client-secret
ingress:
  enabled: false
  className: ''
  host: sst.example.com
  tlsSecret: ''
