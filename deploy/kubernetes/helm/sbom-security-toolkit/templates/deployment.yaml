apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels: { app: sbom-security-toolkit, component: web }
  template:
    metadata:
      labels: { app: sbom-security-toolkit, component: web }
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["python3", "-m", "sbomops.workbench.server", "--host", "0.0.0.0", "--port", "8080"]
          ports: [{ containerPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels: { app: sbom-security-toolkit, component: worker }
  template:
    metadata:
      labels: { app: sbom-security-toolkit, component: worker }
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["python3", "-m", "sbomops.cloud", "worker"]
