name: Bug report
description: Report a toolkit bug
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      render: bash
  - type: textarea
    id: output
    attributes:
      label: Relevant output
      render: text
