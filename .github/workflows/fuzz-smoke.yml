name: fuzz-smoke
on:
  pull_request:
  workflow_dispatch:
jobs:
  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m pip install -r requirements-dev.txt
      - run: make fuzz-regression
      - run: make sbom-experience SBOM=test-sboms/clean/minimal-cyclonedx.json
