version: 1
connectors:
  snyk-default:
    type: snyk
    enabled: false
    mode: read-only
    base_url: https://api.snyk.io
    token_env: SNYK_TOKEN
    project: ""
  dependency-track-default:
    type: dependency-track
    enabled: false
    mode: dry-run
    base_url: http://127.0.0.1:8081
    token_env: DEPENDENCY_TRACK_API_KEY
    project: ""
  defectdojo-default:
    type: defectdojo
    enabled: false
    mode: dry-run
    base_url: http://127.0.0.1:8082
    token_env: DEFECTDOJO_API_TOKEN
    project: ""
