name: SBOM Release Assurance
on:
  pull_request:
  push:
    branches: [main]
jobs:
  assurance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: Evaluate release policy
        run: |
          sst assurance \
            --policy policies/production-release-assurance.yml \
            --findings reports/findings.json \
            --vex reports/vex.json \
            --exceptions governance/exceptions.yml \
            --provenance reports/provenance/provenance-verification.json \
            --context reports/context.json \
            --out-dir reports/release-assurance \
            --fail-on block
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-assurance-evidence
          path: reports/
